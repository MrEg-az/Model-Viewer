<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wuthering Waves & Silver Palace Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>

    @font-face {
      font-family: 'GameFont';
      src: url('./fonts/text.otf') format('otf');
      font-weight: normal;
      font-display: swap;
    }

    body { 
      margin: 0; 
      overflow: hidden; 
      font-family: 'GameFont', 'Inter', system-ui, sans-serif;
    }
    #renderCanvas { width: 100%; height: 100vh; display: block; }
    .model-card { transition: all 0.2s; }
    .model-card:hover { transform: scale(1.03); background-color: rgb(39 39 42); }
    .tab-active { border-bottom: 3px solid #a1a1aa; color: white; }
  </style>
</head>
<body>
  <div class="flex h-screen">

    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
        <img src="https://via.placeholder.com/32" alt="logo" class="w-8">
        <h1 class="text-2xl font-bold tracking-tighter">MODEL VIEWER</h1>
      </div>


      <div class="flex border-b border-zinc-800" id="game-tabs">

      </div>

      <div class="flex-1 overflow-auto p-4 space-y-2" id="model-list">

      </div>

      <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500">
        Click any character • Mouse orbit • Scroll zoom
      </div>
    </div>

    <div class="flex-1 relative">
      <canvas id="renderCanvas"></canvas>
      
      <div id="loading" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-black/90 backdrop-blur-md text-white px-8 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
        <div class="w-5 h-5 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
        <span id="loading-text">Loading model...</span>
      </div>
    </div>
  </div>

  <script>

    const games = [
      { id: "ww", name: "Wuthering Waves", logo: "logos/ww-logo.png" },
      { id: "sp", name: "Silver Palace",   logo: "logos/sp-logo.png" }
    ];

    const models = {
      "ww": [
        { name: "Cartethyia",   file: "cart.glb",   thumb: "thumbnails/T_IconRoleHead256_40_UI.png" },
      ],
      "sp": [
        { name: "Cartethyia",   file: "cart.glb",   thumb: "thumbnails/T_IconRoleHead256_40_UI.png" },
        // ← ADD MORE MODELS HERE
      ]
    };

    let currentGameId = "ww";
    let scene, camera, engine, currentContainer = null;

    tailwind.config = { content: ["*"] };

    function createGameTabs() {
      const container = document.getElementById('game-tabs');
      container.innerHTML = '';
      games.forEach((game, i) => {
        const btn = document.createElement('button');
        btn.className = `flex-1 py-5 flex items-center justify-center hover:bg-zinc-800 transition-all ${i===0 ? 'tab-active' : ''}`;
        btn.innerHTML = `<img src="${game.logo}" class="h-9 drop-shadow-md">`;
        btn.onclick = () => switchGame(game.id);
        container.appendChild(btn);
      });
    }

    function switchGame(gameId) {
      currentGameId = gameId;
      document.querySelectorAll('#game-tabs button').forEach((b, i) => {
        b.classList.toggle('tab-active', games[i].id === gameId);
      });
      renderModelList();
    }

    function renderModelList() {
      const container = document.getElementById('model-list');
      container.innerHTML = '';

      models[currentGameId].forEach(model => {
        const div = document.createElement('div');
        div.className = "model-card flex items-center gap-4 p-4 rounded-2xl bg-zinc-800 hover:bg-zinc-700 cursor-pointer";
        div.innerHTML = `
          <img src="${model.thumb}" class="w-14 h-14 object-cover rounded-xl border border-zinc-700">
          <div>
            <div class="font-medium text-lg">${model.name}</div>
            <div class="text-xs text-zinc-500">${games.find(g => g.id === currentGameId).name}</div>
          </div>
        `;
        div.onclick = () => loadModel(model.file, model.name);
        container.appendChild(div);
      });
    }

    async function loadModel(filename, displayName) {
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');
      loading.classList.remove('hidden');
      loadingText.textContent = 'Loading model...';

      if (currentContainer) {
        currentContainer.dispose();
        currentContainer = null;
      }

      try {
        const container = await BABYLON.SceneLoader.LoadAssetContainerAsync(
          "./models/",
          filename,
          scene,
          (evt) => {
            if (evt.total) {
              const percent = Math.round((evt.loaded / evt.total) * 100);
              loadingText.textContent = `Loading model... ${percent}%`;
            }
          }
        );

        container.addAllToScene();
        currentContainer = container;

        const rootMesh = container.meshes.find(m => !m.parent) || container.meshes[0];

        const bounds = rootMesh.getBoundingInfo();
        const maxDim = Math.max(bounds.boundingBox.extendSize.x, bounds.boundingBox.extendSize.y, bounds.boundingBox.extendSize.z);
        const scale = 6 / maxDim;
        rootMesh.scaling.scaleInPlace(scale);
        rootMesh.position.y = -bounds.boundingBox.minimum.y * scale;

        camera.setTarget(rootMesh.getAbsolutePosition());
        camera.radius = 14;

        console.log(`✅ Loaded ${displayName}`);
      } catch (e) {
        console.error(e);
        alert("Failed to load model.\n\n1. Check the filename\n2. Run the Blender optimization steps");
      }

      loading.classList.add('hidden');
    }

    function initBabylon() {
      const canvas = document.getElementById("renderCanvas");
      engine = new BABYLON.Engine(canvas, true, { 
        preserveDrawingBuffer: true,
        powerPreference: "default"
      });
      scene = new BABYLON.Scene(engine);

      camera = new BABYLON.ArcRotateCamera("cam", Math.PI/2, Math.PI/2.5, 14, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);
      camera.wheelPrecision = 50;

      new BABYLON.HemisphericLight("hlight", new BABYLON.Vector3(0, 1, 0), scene);
      const dlight = new BABYLON.DirectionalLight("dlight", new BABYLON.Vector3(-1, -1, -1), scene);
      dlight.intensity = 0.7;

      scene.environmentTexture = BABYLON.CubeTexture.CreateFromPrefilteredData(
        "https://assets.babylonjs.com/environments/studio.env", scene
      );

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());
    }

    window.onload = () => {
      createGameTabs();
      initBabylon();
      renderModelList();
      
      setTimeout(() => {
        const firstModel = models["ww"][0];
        if (firstModel) loadModel(firstModel.file, firstModel.name);
      }, 100);
    };
  </script>
</body>
</html>
