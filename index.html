<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wuthering Waves & Silver Palace Viewer</title>
  <link rel="icon" type="image/png" href="logos/ww-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>
    @font-face { font-family: 'GameFont'; src: url('./fonts/text.otf') format('opentype'); font-weight: normal; font-display: swap; }
    body { margin: 0; overflow: hidden; font-family: 'GameFont', system-ui, sans-serif; }
    #renderCanvas { width: 100%; height: 100vh; display: block; }

    #loading { position: fixed; inset: 0; background: #09090b; display: none; align-items: center; justify-content: center; z-index: 50; flex-direction: column; gap: 2rem; }
    #loading.active { display: flex; }
    .spinner { width: 80px; height: 80px; border: 6px solid #27272a; border-top: 6px solid #a1a1aa; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 3.5rem; font-weight: 700; letter-spacing: 8px; text-shadow: 0 0 30px rgba(161,161,170,0.5); }
    .model-name { font-size: 1.5rem; color: #71717a; }
    .tab-active { border-bottom: 4px solid #a1a1aa !important; }

    #skin-switcher {
      position: absolute; bottom: 24px; right: 24px; z-index: 40;
      background: rgba(9,9,11,0.85); backdrop-filter: blur(12px);
      border: 1px solid #3f3f46; padding: 8px 16px; border-radius: 9999px;
      display: none; align-items: center; gap: 12px; font-size: 0.95rem;
    }
    #skin-switcher.active { display: flex; }
  </style>
</head>
<body>
  <div class="flex h-screen">
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
        <h1 class="text-2xl font-bold tracking-tighter">MODEL VIEWER</h1>
      </div>
      <div class="flex border-b border-zinc-800" id="game-tabs"></div>
      <div class="flex-1 overflow-auto p-4 space-y-2" id="model-list"></div>
      <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500">
        Click any character • Mouse orbit • Scroll zoom
      </div>
    </div>
    <div class="flex-1 relative">
      <canvas id="renderCanvas"></canvas>
      
      <div id="skin-switcher" class="text-white">
        <button onclick="prevSkin()" class="w-8 h-8 flex items-center justify-center hover:bg-zinc-700 rounded-xl">←</button>
        <div class="font-medium min-w-[120px] text-center" id="skin-name">Default</div>
        <button onclick="nextSkin()" class="w-8 h-8 flex items-center justify-center hover:bg-zinc-700 rounded-xl">→</button>
      </div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>
      <div class="loading-text text-white">LOADING</div>
      <div id="loading-name" class="model-name text-center"></div>
    </div>
    <div id="loading-progress" class="text-zinc-400 text-xl font-medium">0%</div>
  </div>

  <script>
    const games = [
      { id: "ww", name: "Wuthering Waves", logo: "logos/ww-logo.png", skybox: "skyboxes/wuwa.hdr", cubeSize: 1024 },
      { id: "sp", name: "Silver Palace",   logo: "logos/sp-logo.png", skybox: "skyboxes/sp.hdr",   cubeSize: 512 }
    ];

    const models = {
      "ww": [
        { 
          name: "Aemeath", 
          type: "glb",
          skins: [
            { skinName: "Default", file: "Aemeath.glb" }
          ],
          thumb: "thumbnails/ww/T_IconRoleHead256_53_UI.png" 
        },
        { 
          name: "Augusta", 
          type: "glb",
          skins: [
            { skinName: "Default", file: "Aemeath.glb" },
            { skinName: "Teenager", file : "cart.glb" },
            { skinName: "Kid", file : "Rosy1.glb"}
          ],
          thumb: "thumbnails/ww/T_IconRoleHead256_51_UI.png" 
        }
      ],
      "sp": [
        { 
          name: "Detective", 
          type: "glb",
          skins: [
            { skinName: "Default", file: "test.glb" }
          ],
          thumb: "thumbnails/sp/icon_character_card_large_1001.png" 
        }
      ]
    };

    let currentGameId = "ww";
    let scene, camera, engine;
    let currentContainer = null;
    let modelRoot = null;
    let skyboxMesh = null;
    let currentModelConfig = null;
    let currentSkinIndex = 0;

    tailwind.config = { content: ["*"] };

    function createGameTabs() {
      const container = document.getElementById('game-tabs');
      container.innerHTML = '';
      games.forEach((game, i) => {
        const btn = document.createElement('button');
        btn.className = `flex-1 py-5 flex items-center justify-center hover:bg-zinc-800 transition-all ${i===0 ? 'tab-active' : ''}`;
        btn.innerHTML = `<img src="${game.logo}" class="h-9 drop-shadow-md">`;
        btn.onclick = () => switchGame(game.id);
        container.appendChild(btn);
      });
    }

    function switchGame(gameId) {
      currentGameId = gameId;
      document.querySelectorAll('#game-tabs button').forEach((b, i) => {
        b.classList.toggle('tab-active', games[i].id === gameId);
      });
      renderModelList();
    }

    function renderModelList() {
      const container = document.getElementById('model-list');
      container.innerHTML = '';
      models[currentGameId].forEach(model => {
        const div = document.createElement('div');
        div.className = "model-card flex items-center gap-4 p-4 rounded-2xl bg-zinc-800 hover:bg-zinc-700 cursor-pointer transition-all";
        div.innerHTML = `
          <img src="${model.thumb}" class="w-14 h-14 object-cover rounded-xl border border-zinc-700">
          <div>
            <div class="font-medium text-lg">${model.name}</div>
            <div class="text-xs text-zinc-500">${games.find(g => g.id === currentGameId).name}</div>
          </div>
        `;
        div.onclick = () => loadCharacter(model.file, model.name);
        container.appendChild(div);
      });
    }

    async function loadCharacter(modelConfig) {
      currentModelConfig = modelConfig;
      currentSkinIndex = 0;
      loadSkin();
    }

    async function loadSkin() {
      if (!currentModelConfig) return;
      const skin = currentModelConfig.skins[currentSkinIndex];
      const displayName = `${currentModelConfig.name} — ${skin.skinName}`;

      const loadingScreen = document.getElementById('loading');
      const loadingName = document.getElementById('loading-name');
      loadingName.textContent = displayName;
      loadingScreen.classList.add('active');

      if (currentContainer) { currentContainer.dispose(); currentContainer = null; }
      if (modelRoot) { modelRoot.dispose(); modelRoot = null; }

      try {
        const container = await BABYLON.SceneLoader.LoadAssetContainerAsync(
          "./models/", skin.file, scene,
          (evt) => { if (evt.total) document.getElementById('loading-progress').textContent = Math.round((evt.loaded / evt.total) * 100) + "%"; }
        );

        container.addAllToScene();
        currentContainer = container;

        modelRoot = new BABYLON.TransformNode("modelRoot", scene);
        const visualMeshes = container.meshes.filter(m => m.getTotalVertices() > 10);
        visualMeshes.forEach(m => { if (!m.parent || m.parent.name === "__root__") m.parent = modelRoot; });

        const vectors = modelRoot.getHierarchyBoundingVectors(true);
        const size = vectors.max.subtract(vectors.min);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 8 / maxDim;
        modelRoot.scaling.scaleInPlace(scaleFactor);
        modelRoot.position.y = -vectors.min.y * scaleFactor;

        camera.setTarget(modelRoot.position);
        camera.radius = 13;

        updateSkybox();
        updateSkinButton();

      } catch(e) { console.error(e); alert("Load failed"); }

      setTimeout(() => loadingScreen.classList.remove('active'), 300);
    }

    function updateSkinButton() {
      const btn = document.getElementById('skin-switcher');
      if (!currentModelConfig || currentModelConfig.skins.length <= 1) {
        btn.classList.remove('active');
        return;
      }
      const skin = currentModelConfig.skins[currentSkinIndex];
      document.getElementById('skin-name').textContent = skin.skinName;
      btn.classList.add('active');
    }

    window.prevSkin = () => { if (!currentModelConfig) return; currentSkinIndex = (currentSkinIndex - 1 + currentModelConfig.skins.length) % currentModelConfig.skins.length; loadSkin(); };
    window.nextSkin = () => { if (!currentModelConfig) return; currentSkinIndex = (currentSkinIndex + 1) % currentModelConfig.skins.length; loadSkin(); };

    function updateSkybox() {
      if (!scene) return;
      if (skyboxMesh) { skyboxMesh.dispose(); skyboxMesh = null; }
      if (scene.environmentTexture) {
        scene.environmentTexture.dispose();
        scene.environmentTexture = null;
      }

      const game = games.find(g => g.id === currentGameId);
      const hdrUrl = `./${game.skybox}`;

      scene.environmentTexture = new BABYLON.HDRCubeTexture(hdrUrl, scene, game.cubeSize);

      scene.environmentIntensity = 1.45;

      skyboxMesh = scene.createDefaultSkybox(scene.environmentTexture, true, 3000, 0, false);
      skyboxMesh.infiniteDistance = true;

      console.log(`🌌 Visible HDR skybox loaded: ${game.skybox}`);
    }

    function initBabylon() {
      const canvas = document.getElementById("renderCanvas");
      engine = new BABYLON.Engine(canvas, true, { powerPreference: "default" });
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.05, 1);

      camera = new BABYLON.ArcRotateCamera("cam", Math.PI/2, Math.PI/2.4, 13, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);
      camera.wheelPrecision = 50;

      new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      const dlight = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-1,-1,-1), scene);
      dlight.intensity = 0.6;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());
    }

    window.onload = () => {
      createGameTabs();
      initBabylon();
      renderModelList();
      updateSkybox();
      setTimeout(() => {
        const first = models["ww"][0];
        loadCharacter(first);
      }, 300);
    };
  </script>
</body>
</html>
