<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wuthering Waves & Silver Palace Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #renderCanvas { width: 100%; height: 100vh; display: block; }
  </style>
</head>
<body>
  <div class="flex h-screen">
    <!-- SIDEBAR -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <h1 class="text-2xl font-bold tracking-tighter">MODEL VIEWER</h1>
        <p class="text-zinc-500 text-sm">Wuthering Waves & Silver Palace</p>
      </div>

      <!-- GAME TABS -->
      <div class="flex border-b border-zinc-800">
        <button onclick="switchGame(0)" id="tab-0"
          class="flex-1 py-4 text-center font-medium tab-active">WUTHERING WAVES</button>
        <button onclick="switchGame(1)" id="tab-1"
          class="flex-1 py-4 text-center font-medium">SILVER PALACE</button>
      </div>

      <!-- MODEL LIST -->
      <div class="flex-1 overflow-auto p-4" id="model-list">
        <!-- Filled by JavaScript -->
      </div>

      <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500">
        Click any model • Orbit with mouse • Scroll to zoom
      </div>
    </div>

    <!-- 3D CANVAS -->
    <div class="flex-1 relative">
      <canvas id="renderCanvas"></canvas>
      
      <!-- Loading indicator -->
      <div id="loading" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full flex items-center gap-3">
        <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        Loading model...
      </div>
    </div>
  </div>

  <script>
    // ================== CONFIG ==================
    const models = {
      "Wuthering Waves": [
        { name: "Cartethyia", file: "cartglb.glb" },

      ],
      "Silver Palace": [
        { name: "Detective", file: "cartglb.glb" },
        { name: "Main Heroine", file: "cartglb.glb" },

      ]
    };

    let currentGame = "Wuthering Waves";
    let scene, camera, engine, currentMesh;

    // ================== TAILWIND INIT ==================
    tailwind.config = { content: ["*"] };

    // ================== SWITCH GAME ==================
    function switchGame(index) {
      currentGame = index === 0 ? "Wuthering Waves" : "Silver Palace";
      
      document.querySelectorAll('.tab-active').forEach(el => el.classList.remove('tab-active'));
      document.getElementById('tab-' + index).classList.add('tab-active');
      
      renderModelList();
    }

    // ================== RENDER MODEL LIST ==================
    function renderModelList() {
      const container = document.getElementById('model-list');
      container.innerHTML = '';

      models[currentGame].forEach(model => {
        const div = document.createElement('div');
        div.className = "model-card p-4 mb-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 cursor-pointer transition-all";
        div.innerHTML = `
          <div class="font-medium">${model.name}</div>
          <div class="text-xs text-zinc-500">${currentGame}</div>
        `;
        div.onclick = () => loadModel(model.file, model.name);
        container.appendChild(div);
      });
    }

    // ================== LOAD MODEL ==================
    async function loadModel(filename, displayName) {
      const loading = document.getElementById('loading');
      loading.classList.remove('hidden');

      // Remove old model
      if (currentMesh) {
        currentMesh.dispose();
        currentMesh = null;
      }

      try {
        const result = await BABYLON.SceneLoader.ImportMeshAsync(
          "", 
          "./models/", 
          filename, 
          scene
        );

        currentMesh = result.meshes[0];

        // Center and scale nicely
        const bounds = currentMesh.getBoundingInfo();
        const size = bounds.boundingBox.extendSize.scale(2);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 5 / maxDim;
        currentMesh.scaling.scaleInPlace(scale);

        currentMesh.position.y = -bounds.boundingBox.minimum.y * scale;

        // Auto-rotate camera to look good
        camera.setTarget(currentMesh.position);
        camera.radius = 12;

        console.log(`✅ Loaded ${displayName}`);
      } catch (e) {
        console.error("Failed to load", e);
        alert("Couldn't load model. Make sure the .glb file is in /models/ folder!");
      }

      loading.classList.add('hidden');
    }

    // ================== INIT BABYLON ==================
    function initBabylon() {
      const canvas = document.getElementById("renderCanvas");
      engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true });
      scene = new BABYLON.Scene(engine);

      // Camera
      camera = new BABYLON.ArcRotateCamera("cam", Math.PI/2, Math.PI/2.5, 12, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);
      camera.wheelPrecision = 50;
      camera.minZ = 0.1;
      camera.maxZ = 1000;

      // Lights
      new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);
      const light2 = new BABYLON.DirectionalLight("light2", new BABYLON.Vector3(-1, -1, -1), scene);
      light2.intensity = 0.8;

      // Simple environment (optional nice look)
      scene.environmentTexture = BABYLON.CubeTexture.CreateFromPrefilteredData(
        "https://assets.babylonjs.com/environments/studio.env", scene
      );
      scene.createDefaultEnvironment({ createSkybox: false });

      // Render loop
      engine.runRenderLoop(() => scene.render());

      // Resize
      window.addEventListener("resize", () => engine.resize());
    }

    // ================== START ==================
    window.onload = () => {
      initBabylon();
      renderModelList();
      
      // Load first model automatically
      setTimeout(() => {
        loadModel(models["Wuthering Waves"][0].file, models["Wuthering Waves"][0].name);
      }, 300);
    };
  </script>
</body>
</html>
